services:

  postgres:
    image: postgres:15.4
    environment:
      - POSTGRES_USER=default
      - POSTGRES_PASSWORD=postgres123
    volumes:
      - ./postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    volumes:
      - ./redis:/usr/local/etc/redis

  raas:
    image: raas:latest
    command: "-l debug"
    ports:
      - "8080:8080"
    volumes:
      - ./raas:/etc/raas
    depends_on:
      - postgres
      - redis

  salt-master:
    image: salt-master:latest
    command: "-l debug"
    volumes:
      - ./master:/etc/salt
    depends_on:
      - raas
